<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 13px system-ui, sans-serif;
        width: 340px;
        margin: 0;
        padding: 10px;
      }
      button {
        font: inherit;
        padding: 4px 10px;
        cursor: pointer;
      }
      .add-row {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 8px;
      }
      .add-row select {
        font: inherit;
        flex: 1;
        min-width: 0;
        padding: 3px;
      }
      .bar {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 6px;
      }
      .bar .spacer { flex: 1; }
      #status {
        color: #888;
        margin: 6px 0;
      }
      ul {
        list-style: none;
        margin: 6px 0 0;
        padding: 0;
      }
      li {
        padding: 4px 0;
        border-top: 1px solid #eee;
      }
      li a {
        text-decoration: none;
        color: #1a56db;
      }
      li .url {
        display: block;
        color: #999;
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="add-row">
      <button id="add-page">Add this page</button>
      <select id="folder" title="Destination folder"></select>
    </div>
    <div class="bar">
      <button id="refresh">List bookmarks</button>
      <div class="spacer"></div>
      <button id="open-manager">Open manager</button>
    </div>
    <div id="status"></div>
    <ul id="list"></ul>
    <script src="popup.js"></script>
  </body>
</html>
